apiVersion: apps/v1
kind: Deployment
metadata:
  name: venturelens-api
  labels:
    app: venturelens
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: venturelens
      component: api
  template:
    metadata:
      labels:
        app: venturelens
        component: api
    spec:
      containers:
      - name: api
        image: venturelens-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: venturelens-secrets
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: venturelens-worker
  labels:
    app: venturelens
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: venturelens
      component: worker
  template:
    metadata:
      labels:
        app: venturelens
        component: worker
    spec:
      containers:
      - name: worker
        image: venturelens-backend:latest
        command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info"]
        envFrom:
        - secretRef:
            name: venturelens-secrets
        resources:
          requests:
            cpu: 1000m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi
