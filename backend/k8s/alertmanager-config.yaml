global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'jira-webhook'
  routes:
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true
    - match:
        severity: critical
      receiver: 'jira-webhook'

receivers:
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: '<SECRET_PAGERDUTY_ROUTING_KEY>'
        description: '{{ template "pagerduty.default.description" . }}'
        severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}warning{{ end }}'

  - name: 'jira-webhook'
    webhook_configs:
      - url: 'http://jira-alert-bridge.monitoring.svc.cluster.local/webhook'
        send_resolved: true
